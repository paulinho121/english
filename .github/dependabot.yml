version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "security"
    ignore:
      # Ignorar atualizações major que podem quebrar a API
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
